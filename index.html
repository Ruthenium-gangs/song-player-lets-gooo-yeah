<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Very fucking cool musicplayer yeahhh</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="sidebar">
  <input type="file" id="fileInput" multiple accept="audio/*">
</div>

<div class="main">

  <div id="playlist" class="playlist"></div>

  <div class="player">

    <canvas id="visualizer" width="800" height="120"></canvas>

    <div id="nowPlaying">select song</div>

    <div class="progress-container" id="progressContainer">
      <div class="progress" id="progress"></div>
      <div class="knob" id="knob"></div>
    </div>

    <div>
      <span id="currentTime">0:00</span> /
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
      <button onclick="prevSong()">◀</button>
      <button id="playPauseBtn" onclick="togglePlay()">▶</button>
      <button onclick="nextSong()">▶▶</button>

      <button onclick="toggleSingleLoop(event)">🔂</button>

      <button onclick="startRecording()">●</button>
      <button onclick="stopRecording()">■</button>

      🔊 <input type="range" min="0" max="1" step="0.01" id="volume" class="volume">

      Bass <input type="range" id="bass" min="0" max="2" step="0.1" value="1">
      Treble <input type="range" id="treble" min="0" max="2" step="0.1" value="1">

      <select id="speed">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>

    </div>

    <audio id="audio"></audio>

  </div>

</div>

</body>
</html>
